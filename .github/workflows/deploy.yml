name: CI/CD Pipeline — Color-Match-App

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/color-match-app-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          build-args: |
            VITE_API_URL=http://localhost:5000/api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/color-match-app-frontend:latest

      - name: Test backend health
        run: |
          docker run -d --name test-backend -p 5000:5000 \
            -e PORT=5000 \
            -e MONGO_URI=mongodb://localhost:27017/colordb \
            --network host \
            ${{ secrets.DOCKER_USERNAME }}/color-match-app-backend:latest
          echo "Waiting for server to start..."
          sleep 15
          echo "========== CONTAINER LOGS =========="
          docker logs test-backend
          echo "=================================="
          curl --fail http://localhost:5000/health || exit 1

      - name: Cleanup test container
        if: always()
        run: |
          docker stop test-backend || true
          docker rm test-backend || true